name: Weekly link check

on:
  schedule:
    # Mondays at 13:00 UTC (~6am Pacific) — pick a quiet time
    - cron: '0 13 * * 1'
  workflow_dispatch:  # allow manual runs

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run link checker
        id: check
        run: node scripts/check-links.mjs

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: scripts/link-check-report.md
          retention-days: 30

      - name: Open / update issue if any links are broken
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('scripts/link-check-report.md', 'utf8');
            const brokenLine = report.match(/Broken: \*\*(\d+)\*\*/);
            const brokenCount = brokenLine ? parseInt(brokenLine[1], 10) : 0;
            const title = `[link-rot] Weekly check — ${brokenCount} broken links`;

            // Find any existing open link-rot issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'link-rot',
              state: 'open',
              per_page: 1
            });

            if (brokenCount === 0) {
              // No issues — close existing if any
              if (existing.data.length > 0) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.data[0].number,
                  state: 'closed'
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.data[0].number,
                  body: '✅ No broken links found this week — closing.'
                });
              }
              return;
            }

            const body = report + '\n\n_Auto-generated by `.github/workflows/link-check.yml`. Re-run via Actions tab._';

            if (existing.data.length > 0) {
              // Update the existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                title,
                body
              });
            } else {
              // Create a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['link-rot']
              });
            }
